name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI runs only the rule-based checks. The eval-harness judge-model pass is a
# separate, less-frequent job (see ci-eval.yml) — per-PR judge-model cost is
# not worth paying on every push.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build, lint, test
        run: ./gradlew build
