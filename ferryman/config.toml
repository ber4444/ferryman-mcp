# ferryman — provider routing configuration.
#
# This file is the single source of truth for which LLM providers ferryman can
# route skills to. It is intentionally TOML so the Python eval harness reads it
# with stdlib `tomllib` — see docs/plans/eval-harness.md.
#
# `apiKeyEnv` holds the *name* of the environment variable, never the key.
# Secrets live in the environment only.

default_provider = "zai-glm"

[providers.zai-glm]
type = "openai-compatible"
# z.ai GLM Coding Plan endpoint — OpenAI-compatible.
baseUrl = "https://api.z.ai/api/coding/paas/v4"
# glm-5.2 is z.ai's flagship coding model; verify at docs.z.ai.
model = "glm-5.2"
apiKeyEnv = "ZAI_API_KEY"

[providers.gemini]
type = "openai-compatible"
# Google Gemini OpenAI-compatible endpoint. Base URL verified at
# https://ai.google.dev/gemini-api/docs/openai (checked 2026-07-15).
baseUrl = "https://generativelanguage.googleapis.com/v1beta/openai"
# gemini-2.5-flash deprecated 2026-06; gemini-3.5-flash is the replacement.
# Verify current model at https://ai.google.dev/gemini-api/docs/deprecations
model = "gemini-3.5-flash"
apiKeyEnv = "GEMINI_API_KEY"

[providers.hf-llama]
type = "openai-compatible"
# Hugging Face Inference Providers — OpenAI-compatible chat completions.
# Base URL verified at https://huggingface.co/docs/inference-providers/en/index (2026-07-15).
baseUrl = "https://router.huggingface.co/v1"
# Llama 3.1 8B via DeepInfra on HF router — supports tools, $0.02/$0.05 per token,
# better uptime than Gemini free tier. Phi-3.5-mini not available with tool support on HF.
model = "meta-llama/Llama-3.1-8B-Instruct"
apiKeyEnv = "HF_TOKEN"
