# ferryman — provider routing configuration.
#
# This file is the single source of truth for which LLM providers ferryman can
# route skills to. It is intentionally TOML so the Python eval harness reads it
# with stdlib `tomllib` — see docs/plans/eval-harness.md.
#
# `apiKeyEnv` holds the *name* of the environment variable, never the key.
# Secrets live in the environment only.

default_provider = "zai-glm"

[providers.zai-glm]
type = "openai-compatible"
# z.ai GLM Coding Plan endpoint — OpenAI-compatible.
baseUrl = "https://api.z.ai/api/coding/paas/v4"
# glm-5-turbo is the cheaper turbo tier; swapped from glm-5.2 (which scored
# higher but costs more). Verify the current model at docs.z.ai.
model = "glm-5-turbo"
apiKeyEnv = "ZAI_API_KEY"

[providers.gemini]
type = "openai-compatible"
# Google Gemini OpenAI-compatible endpoint. Base URL verified at
# https://ai.google.dev/gemini-api/docs/openai (checked 2026-07-15).
baseUrl = "https://generativelanguage.googleapis.com/v1beta/openai"
# gemini-3.1-flash-lite — the current-generation flash-lite tier. Stable (only
# the Preview variant was shut down 2026-05-25), supports function calling, and
# has a 10M TPM rate limit — the headroom that should prevent the 429s/503s hit
# by earlier models (gemini-3.5-flash-lite doesn't exist; 2.5-flash-lite is
# deprecated for new users per the API's own message, 2026-07-16).
# Verify at https://ai.google.dev/gemini-api/docs/models
model = "gemini-3.1-flash-lite"
apiKeyEnv = "GEMINI_API_KEY"

[providers.hf-llama]
type = "openai-compatible"
# DeepInfra direct — OpenAI-compatible.
# Verified at https://deepinfra.com/docs (2026-07-15).
baseUrl = "https://api.deepinfra.com/v1/openai"
# Llama 3.1 70B — handles function calling reliably (8B was too small, emitted
# fake tool-call syntax as text). $0.59/$0.79 per 1M tokens on DeepInfra.
model = "meta-llama/Meta-Llama-3.1-70B-Instruct-Turbo"
apiKeyEnv = "DEEPINFRA_API_KEY"
